name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-apk.yml'
      - 'twa-manifest.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Accept Android SDK licenses
        run: |
          mkdir -p $ANDROID_HOME/licenses
          printf '\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e' \
            > $ANDROID_HOME/licenses/android-sdk-license
          printf '\n84831b9409646a918e30573bab4c9c91346d8abd' \
            > $ANDROID_HOME/licenses/android-sdk-preview-license
          printf '\n33b6937984c3f0cd9dc7d04b2e91b0a374507840' \
            > $ANDROID_HOME/licenses/android-sdk-arm-dbt-license

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap (skip interactive prompts)
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json
          cat ~/.bubblewrap/config.json

      - name: Generate signing keystore
        run: |
          keytool -genkey -v \
            -keystore android.keystore \
            -alias rostrumakademi \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Rostrum Akademi, OU=IT, O=Rostrum Akademi, L=Istanbul, S=Istanbul, C=TR" \
            -storepass rostrum2024 \
            -keypass rostrum2024 \
            -noprompt

      - name: Generate Android project from twa-manifest
        run: bubblewrap update

      - name: Build TWA APK
        run: bubblewrap build
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: rostrum2024
          BUBBLEWRAP_KEY_PASSWORD: rostrum2024

      - name: Find APK
        run: find . -name "*.apk" 2>/dev/null | grep -v node_modules || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rostrum-akademi-apk-${{ github.run_number }}
          path: '**/*.apk'
          if-no-files-found: warn
