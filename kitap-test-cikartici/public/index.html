<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kitap Test Çıkarıcı</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #080c14; font-family: 'IBM Plex Mono', monospace; color: #c9d1e0; min-height: 100vh; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: #0a0f1a; } ::-webkit-scrollbar-thumb { background: #1e2d45; border-radius: 4px; }

    @keyframes fadeUp   { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spin     { to { transform: rotate(360deg); } }
    @keyframes blink    { 0%,100%{opacity:1} 50%{opacity:.3} }

    .fu  { animation: fadeUp .35s cubic-bezier(.16,1,.3,1) both; }

    .wrap { max-width: 720px; margin: 0 auto; padding: 36px 18px 100px; }

    /* Input */
    .ifield {
      background: #0d1523; border: 1px solid #1a2840; color: #e2e8f0;
      font-family: 'IBM Plex Mono', monospace; font-size: 14px;
      padding: 10px 14px; border-radius: 4px; outline: none; width: 100%;
      transition: border-color .2s;
    }
    .ifield:focus { border-color: #f97316; }
    .ifield::placeholder { color: #1e3050; }

    /* Buttons */
    .bo {
      background: #f97316; border: none; color: #080c14;
      font-family: 'IBM Plex Mono', monospace; font-weight: 700; font-size: 14px;
      padding: 11px 24px; border-radius: 4px; cursor: pointer; white-space: nowrap;
      transition: .15s;
    }
    .bo:hover  { background: #fb923c; transform: translateY(-1px); }
    .bo:active { transform: translateY(0); }
    .bo:disabled { background: #1a2840; color: #2d4060; cursor: default; transform: none; }

    .bg {
      background: transparent; border: 1px solid #1a2840; color: #4a6080;
      font-family: 'IBM Plex Mono', monospace; font-size: 12px;
      padding: 7px 14px; border-radius: 4px; cursor: pointer; transition: .15s;
    }
    .bg:hover { border-color: #f97316; color: #f97316; }

    /* Search box */
    .search-box {
      display: flex; gap: 8px; background: #0d1523;
      border: 1px solid #1a2840; border-radius: 6px; padding: 6px;
      transition: border-color .3s;
    }
    .search-box.active { border-color: #f97316; }

    /* Autocomplete */
    .autocomplete {
      position: absolute; top: calc(100% + 3px); left: 0; right: 0;
      background: #0d1523; border: 1px solid #1a2840; border-radius: 6px;
      overflow: hidden; z-index: 60; box-shadow: 0 20px 50px rgba(0,0,0,.6);
    }
    .ac-item {
      padding: 10px 16px; cursor: pointer; font-size: 13px; color: #4a6080;
      border-bottom: 1px solid #0f1a2a; transition: .1s;
    }
    .ac-item:last-child { border-bottom: none; }
    .ac-item:hover { background: #141f33; color: #f97316; }

    /* Result table */
    .table-wrap { background: #0d1523; border: 1px solid #1a2840; border-radius: 8px; overflow: hidden; }
    .table-head { display: grid; grid-template-columns: 40px 1fr 80px; background: #0a1020; padding: 10px 16px; border-bottom: 1px solid #1a2840; }
    .table-head span { font-size: 10px; color: #2d4060; letter-spacing: .1em; }
    .table-row { display: grid; grid-template-columns: 40px 1fr 80px; padding: 11px 16px; border-bottom: 1px solid #0f1a2a; align-items: center; transition: background .1s; }
    .table-row:last-child { border-bottom: none; }
    .table-row:hover { background: rgba(249,115,22,.05); }

    .tag { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 3px; letter-spacing: .08em; border: 1px solid currentColor; }
    .stat-box { background: #0d1523; border: 1px solid #1a2840; border-radius: 5px; padding: 6px 14px; }
    .stat-box .label { font-size: 10px; color: #2d4060; display: block; }
    .stat-box .value { font-size: 20px; font-weight: 700; }

    /* Edit row */
    .edit-row { display: flex; gap: 7px; margin-bottom: 7px; }

    /* Hidden */
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div style="margin-bottom:32px;">
    <div style="font-family:'DM Serif Display',serif;font-size:clamp(26px,5vw,42px);line-height:1.1;color:#f1f5fb;">
      Kitap Test<br><span style="font-style:italic;color:#f97316;">Çıkarıcı</span>
    </div>
    <p style="margin-top:8px;font-size:11px;color:#2d4060;">Kitap adını yaz → AI ile test listesini çıkar</p>
  </div>

  <!-- Search -->
  <div style="position:relative;margin-bottom:28px;">
    <div class="search-box" id="searchBox">
      <input class="ifield" id="queryInput" style="background:transparent;border:none;font-size:15px;padding:10px 12px;"
        placeholder="Kitap adı… (örn: Bilgi Sarmal AYT Fizik)" autocomplete="off" />
      <button class="bo" id="searchBtn">ARA →</button>
    </div>
    <div class="autocomplete hidden" id="acDropdown"></div>
  </div>

  <!-- Loading -->
  <div id="loadingEl" class="hidden" style="display:flex;align-items:center;gap:14px;padding:20px 0;color:#f97316;font-size:13px;">
    <div style="width:18px;height:18px;border:2px solid #f97316;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;"></div>
    <span id="loadingText">Claude sorgulanıyor…</span>
  </div>

  <!-- Error -->
  <div id="errorEl" class="hidden fu" style="background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);border-radius:6px;padding:13px 16px;margin-bottom:20px;font-size:13px;color:#fca5a5;"></div>

  <!-- Edit Mode -->
  <div id="editPanel" class="hidden fu" style="background:#0d1523;border:1px solid #1a2840;border-radius:8px;padding:20px;margin-bottom:24px;">
    <p style="font-size:11px;color:#f97316;letter-spacing:.1em;margin-bottom:12px;">✏ MANUEL DÜZENLEME</p>
    <div id="editRows"></div>
    <div style="display:flex;gap:8px;margin-top:8px;">
      <button class="bg" id="addRowBtn">+ Satır</button>
      <button class="bo" id="saveEditBtn" style="font-size:13px;padding:8px 18px;">Kaydet</button>
      <button class="bg" id="cancelEditBtn">İptal</button>
    </div>
  </div>

  <!-- Results -->
  <div id="resultPanel" class="hidden fu">
    <!-- Stats + actions -->
    <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:14px;justify-content:space-between;">
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <div class="stat-box"><span class="label">TEST</span><span class="value" id="statTest" style="color:#f97316;">0</span></div>
        <div class="stat-box"><span class="label">SORU</span><span class="value" id="statSoru" style="color:#3b82f6;">0</span></div>
        <span class="tag" id="confBadge"></span>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="bg" id="copyBtn">Kopyala</button>
        <button class="bg" id="csvBtn">CSV</button>
        <button class="bg" id="jsonBtn">JSON</button>
        <button class="bg" id="editBtn">Düzenle</button>
      </div>
    </div>

    <!-- Note -->
    <div id="noteEl" class="hidden" style="background:#080c14;border:1px solid #0f1a2a;border-radius:5px;padding:8px 13px;margin-bottom:12px;font-size:12px;color:#2d5080;font-style:italic;"></div>

    <!-- Table -->
    <div class="table-wrap">
      <div class="table-head"><span>#</span><span>TEST ADI</span><span>SORU</span></div>
      <div id="tableBody"></div>
    </div>

    <!-- Disclaimer -->
    <div id="disclaimerEl" class="hidden" style="margin-top:10px;font-size:11px;color:#7a3a10;line-height:1.6;"></div>
  </div>

  <!-- Empty state -->
  <div id="emptyState" style="padding-top:8px;">
    <p style="font-size:11px;color:#1a2840;letter-spacing:.1em;margin-bottom:14px;">ÖRNEK ARAMALAR</p>
    <div style="display:flex;flex-wrap:wrap;gap:8px;" id="quickBtns"></div>
  </div>

</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let currentResult = null;
let searchHistory = [];

const EXAMPLES = [
  "Bilgi Sarmal AYT Fizik Soru Bankası",
  "Limit AYT Matematik Soru Bankası",
  "Karekök TYT Kimya",
  "Ertan Sinan Şahin AYT Fizik",
  "Fenomen AYT Biyoloji",
];

const CONF = {
  yuksek: { c: "#4ade80", l: "GERÇEK VERİ" },
  orta:   { c: "#f59e0b", l: "KISMEN EŞLEŞTİ" },
  dusuk:  { c: "#f97316", l: "TAHMİN" },
  manuel: { c: "#a78bfa", l: "MANUEL" },
};

// ── DOM refs ─────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const queryInput  = $("queryInput");
const searchBtn   = $("searchBtn");
const searchBox   = $("searchBox");
const acDropdown  = $("acDropdown");
const loadingEl   = $("loadingEl");
const loadingText = $("loadingText");
const errorEl     = $("errorEl");
const editPanel   = $("editPanel");
const editRowsEl  = $("editRows");
const resultPanel = $("resultPanel");
const emptyState  = $("emptyState");

// ── Quick search buttons ──────────────────────────────────────────────────────
const qb = $("quickBtns");
EXAMPLES.forEach(b => {
  const btn = document.createElement("button");
  btn.className = "bg"; btn.style.fontSize = "11px"; btn.textContent = b;
  btn.onclick = () => { queryInput.value = b; doSearch(b); };
  qb.appendChild(btn);
});

// ── Autocomplete ──────────────────────────────────────────────────────────────
queryInput.addEventListener("input", () => {
  const q = queryInput.value.toLowerCase().trim();
  if (!q) { acDropdown.classList.add("hidden"); return; }
  const matches = searchHistory.filter(h => h.toLowerCase().includes(q)).slice(0, 5);
  if (!matches.length) { acDropdown.classList.add("hidden"); return; }
  acDropdown.innerHTML = matches.map(m =>
    `<div class="ac-item" data-val="${m}">🕐 ${m}</div>`
  ).join("");
  acDropdown.classList.remove("hidden");
});
acDropdown.addEventListener("mousedown", e => {
  const item = e.target.closest(".ac-item");
  if (item) { queryInput.value = item.dataset.val; acDropdown.classList.add("hidden"); }
});
document.addEventListener("click", e => {
  if (!searchBox.contains(e.target)) acDropdown.classList.add("hidden");
});
queryInput.addEventListener("keydown", e => { if (e.key === "Enter") handleSearch(); });
searchBtn.addEventListener("click", handleSearch);

// ── API call via /api/claude proxy ────────────────────────────────────────────
async function callClaude(prompt, system = "") {
  const body = {
    model: "claude-sonnet-4-20250514",
    max_tokens: 2000,
    messages: [{ role: "user", content: prompt }],
  };
  if (system) body.system = system;

  const res = await fetch("/api/claude", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });

  if (!res.ok) throw new Error(`Proxy hatası: ${res.status}`);
  const data = await res.json();
  const text = (data.content || []).map(b => b.text || "").join("");
  if (!text) throw new Error("Boş yanıt");
  return text;
}

// ── Extract test list ─────────────────────────────────────────────────────────
async function getTestList(bookName) {
  const prompt = `Sen Türkiye'deki sınav hazırlık kitapları hakkında bilgili bir uzmansın.

"${bookName}" kitabı hakkında bilgin varsa gerçek test listesini yaz.
Bilgin yoksa kitabın dersine göre makul bir test listesi oluştur.

Türk sınav kitapları formatı:
- Her konu için 2-4 test
- Her testte 8-18 soru  
- Format: "KonuAdı - Test 1", "KonuAdı - Test 2"

SADECE JSON döndür, başka hiçbir şey yazma:
{"guven":"yuksek|orta|dusuk","not":"kısa açıklama veya boş string","testler":[{"test":"Konu - Test 1","soru":12},{"test":"Konu - Test 2","soru":14}]}`;

  const raw = await callClaude(prompt,
    "Türk eğitim kitabı uzmanısın. YALNIZCA geçerli JSON döndür. Markdown yasak."
  );

  const match = raw.match(/\{[\s\S]*\}/);
  if (!match) throw new Error("JSON parse hatası");
  return JSON.parse(match[0]);
}

// ── Main search ───────────────────────────────────────────────────────────────
function handleSearch() {
  const q = queryInput.value.trim();
  if (!q) return;
  doSearch(q);
}

async function doSearch(bookName) {
  // Add to history
  searchHistory = [bookName, ...searchHistory.filter(h => h !== bookName)].slice(0, 30);

  // UI state
  setLoading(true);
  showError(null);
  showResult(null);
  emptyState.classList.add("hidden");
  acDropdown.classList.add("hidden");

  try {
    let dots = 0;
    const dotTimer = setInterval(() => {
      dots = (dots + 1) % 4;
      loadingText.textContent = "Claude sorgulanıyor" + ".".repeat(dots);
    }, 400);

    const data = await getTestList(bookName);
    clearInterval(dotTimer);
    currentResult = data;
    showResult(data);
  } catch (e) {
    showError(e.message);
  } finally {
    setLoading(false);
  }
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function setLoading(on) {
  searchBtn.disabled = on;
  queryInput.disabled = on;
  searchBox.classList.toggle("active", on);
  loadingEl.style.display = on ? "flex" : "none";
}

function showError(msg) {
  if (msg) {
    errorEl.textContent = "⚠ " + msg;
    errorEl.classList.remove("hidden");
  } else {
    errorEl.classList.add("hidden");
  }
}

function showResult(data) {
  if (!data) { resultPanel.classList.add("hidden"); return; }

  const testler = data.testler || [];
  const totalSoru = testler.reduce((s, r) => s + (parseInt(r.soru) || 0), 0);
  const conf = CONF[data.guven] || CONF.dusuk;

  $("statTest").textContent = testler.length;
  $("statSoru").textContent = totalSoru || "?";
  $("confBadge").textContent = conf.l;
  $("confBadge").style.color = conf.c;

  // Note
  if (data.not) {
    $("noteEl").textContent = "💬 " + data.not;
    $("noteEl").classList.remove("hidden");
  } else {
    $("noteEl").classList.add("hidden");
  }

  // Table
  const tbody = $("tableBody");
  if (testler.length === 0) {
    tbody.innerHTML = `<div style="padding:28px;text-align:center;color:#2d4060;font-size:13px;">Sonuç yok — Düzenle ile manuel ekle</div>`;
  } else {
    tbody.innerHTML = testler.map((row, i) => {
      const soru = row.soru != null && row.soru !== "" ? parseInt(row.soru) : null;
      const bar  = soru ? `<div style="height:3px;width:${Math.max(8, Math.min(44, soru/20*44))}px;background:#f97316;border-radius:2px;opacity:.5;"></div>` : "";
      const num  = soru != null ? `<span style="font-size:14px;font-weight:700;color:#f97316;">${soru}</span>` : `<span style="font-size:12px;color:#2d4060;">—</span>`;
      return `<div class="table-row">
        <span style="font-size:11px;color:#1e3a5a;">${String(i+1).padStart(2,"0")}</span>
        <span style="font-size:13px;color:#c9d1e0;">${row.test}</span>
        <div style="display:flex;align-items:center;gap:6px;">${bar}${num}</div>
      </div>`;
    }).join("");
  }

  // Disclaimer
  if (data.guven === "dusuk") {
    $("disclaimerEl").innerHTML = "⚠ Bu liste AI tahminidir. Kitabınızla karşılaştırın, \"Düzenle\" ile düzeltin.";
    $("disclaimerEl").classList.remove("hidden");
  } else {
    $("disclaimerEl").classList.add("hidden");
  }

  resultPanel.classList.remove("hidden");
}

// ── Copy / Export ─────────────────────────────────────────────────────────────
$("copyBtn").onclick = () => {
  const testler = currentResult?.testler || [];
  const txt = ["Test Adı\tSoru Sayısı", ...testler.map(r => `${r.test}\t${r.soru ?? "?"}`)].join("\n");
  navigator.clipboard.writeText(txt).then(() => {
    $("copyBtn").textContent = "✓ Kopyalandı";
    setTimeout(() => $("copyBtn").textContent = "Kopyala", 2000);
  });
};

$("csvBtn").onclick = () => {
  const testler = currentResult?.testler || [];
  const csv = "\uFEFF" + ["Test Adı,Soru Sayısı", ...testler.map(r => `"${r.test}",${r.soru ?? ""}`)].join("\n");
  dl(csv, queryInput.value.slice(0,40) + ".csv", "text/csv");
};

$("jsonBtn").onclick = () => {
  dl(JSON.stringify({ kitap: queryInput.value, ...currentResult }, null, 2),
     queryInput.value.slice(0,40) + ".json", "application/json");
};

function dl(content, name, type) {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([content], { type }));
  a.download = name; a.click();
}

// ── Edit mode ─────────────────────────────────────────────────────────────────
$("editBtn").onclick = () => {
  const rows = currentResult?.testler || [];
  renderEditRows(rows);
  editPanel.classList.remove("hidden");
  resultPanel.classList.add("hidden");
};

function renderEditRows(rows) {
  editRowsEl.innerHTML = rows.map((r, i) => `
    <div class="edit-row" data-idx="${i}">
      <input class="ifield edit-name" value="${r.test}" placeholder="Test adı" />
      <input class="ifield edit-soru" type="number" value="${r.soru || ""}" placeholder="#" style="width:90px;flex-shrink:0;" />
      <button class="bg del-row">✕</button>
    </div>`).join("");

  editRowsEl.querySelectorAll(".del-row").forEach(btn => {
    btn.onclick = () => btn.closest(".edit-row").remove();
  });
}

$("addRowBtn").onclick = () => {
  const div = document.createElement("div");
  div.className = "edit-row";
  div.innerHTML = `<input class="ifield edit-name" placeholder="Test adı" /><input class="ifield edit-soru" type="number" placeholder="#" style="width:90px;flex-shrink:0;" /><button class="bg del-row">✕</button>`;
  div.querySelector(".del-row").onclick = () => div.remove();
  editRowsEl.appendChild(div);
};

$("saveEditBtn").onclick = () => {
  const rows = [...editRowsEl.querySelectorAll(".edit-row")].map(r => ({
    test: r.querySelector(".edit-name").value.trim(),
    soru: r.querySelector(".edit-soru").value || null,
  })).filter(r => r.test);
  currentResult = { ...currentResult, testler: rows, guven: "manuel" };
  editPanel.classList.add("hidden");
  showResult(currentResult);
};

$("cancelEditBtn").onclick = () => {
  editPanel.classList.add("hidden");
  if (currentResult) showResult(currentResult);
};
</script>
</body>
</html>
